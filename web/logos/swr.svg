<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#020c05"/>
      <stop offset="100%" stop-color="#041208"/>
    </linearGradient>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00a651"/>
      <stop offset="100%" stop-color="#00c261"/>
    </linearGradient>
    <linearGradient id="d" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c9a84c"/>
      <stop offset="100%" stop-color="#e8c46a"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="100" cy="100" r="100" fill="url(#bg)"/>
  <circle cx="100" cy="100" r="98" fill="none" stroke="#00a651" stroke-width="2" opacity="0.4"/>
  <!-- Network nodes -->
  <circle cx="68" cy="68" r="10" fill="url(#g)"/>
  <circle cx="100" cy="118" r="10" fill="url(#g)" opacity="0.7"/>
  <circle cx="132" cy="68" r="10" fill="url(#d)"/>
  <line x1="68" y1="78" x2="100" y2="108" stroke="url(#g)" stroke-width="2.5" opacity="0.6"/>
  <line x1="100" y1="108" x2="132" y2="78" stroke="url(#d)" stroke-width="2.5" opacity="0.6"/>
  <line x1="68" y1="68" x2="132" y2="68" stroke="#00a651" stroke-width="1.5" opacity="0.25"/>
  <!-- SWR text -->
  <text x="100" y="162" font-family="'Inter', 'Arial', sans-serif" font-size="34" font-weight="900" fill="#ffffff" text-anchor="middle" letter-spacing="-1">SWR</text>
</svg>
