<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0a02"/>
      <stop offset="100%" stop-color="#1a1002"/>
    </linearGradient>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c9a84c"/>
      <stop offset="100%" stop-color="#e8c46a"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="100" cy="100" r="100" fill="url(#bg)"/>
  <circle cx="100" cy="100" r="98" fill="none" stroke="#c9a84c" stroke-width="2" opacity="0.4"/>
  <!-- SAR symbol (ر.س) -->
  <text x="100" y="118" font-family="'Cairo', 'Arial', sans-serif" font-size="72" font-weight="900" fill="url(#g)" text-anchor="middle">ر</text>
  <!-- SARX label -->
  <text x="100" y="168" font-family="'Inter', 'Arial', sans-serif" font-size="22" font-weight="700" fill="#c9a84c" text-anchor="middle" opacity="0.8">SARX</text>
</svg>
